<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory API Swagger UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.20.1/swagger-ui.css" integrity="sha512-BZUxFAy9JnquCD0cmSxEgfOp7stYHSg81nqXBAwp0Nn+fTq/e+GQ99Fd6bJhH++25LYxGbmR+Na0SZhfWP7l2Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>body { margin: 0; padding: 0; }</style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.20.1/swagger-ui-bundle.js" integrity="sha512-7b0+Q8+mXfj7t4pzFkB0/I/xH5OY3SxWcG1w0W8UJxIQRgCj4G6F4uAdaYDP5vROI+TYIW0N3kX3XDsIXaXC+Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      window.onload = function () {
        SwaggerUIBundle({
          url: '{{ spec_url }}',
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis],
          layout: 'BaseLayout',
        });
      };
    </script>
  </body>
</html>
