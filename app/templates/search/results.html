{% extends "base.html" %}
{% block content %}
<div class="page-heading">
  <div>
    <h1>Search</h1>
    <p>Results for "{{ query }}".</p>
  </div>
</div>
<div class="content-panel">
  <table class="table table-hover align-middle">
    <thead><tr><th>Product</th><th>SKU</th><th>Stock</th></tr></thead>
    <tbody>
      {% for product in products %}
      <tr><td>{{ product.name }}</td><td>{{ product.sku }}</td><td>{{ product.quantity }}</td></tr>
      {% else %}
      <tr><td colspan="3" class="text-center py-4">No results found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
